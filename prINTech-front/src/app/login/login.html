<div class="page">
  <div class="card">

    <div class="logo-area">
      <img src="logo.png" alt="PrINTech" class="logo-img">
      <div class="tagline">Portail d'impression 3Ds</div>
    </div>

    @if (errorMessage()) {
      <div class="error" role="alert" aria-live="polite">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" formControlName="email" placeholder="prenom.nom@telecom-sudparis.eu">
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password">
      </div>

      <button class="btn" type="submit" [disabled]="loading() || loginForm.invalid">
        {{ loading() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

  </div>
</div>
