<article class="profile-card" aria-labelledby="security-title">
	<h2 id="security-title">Changer le mot de passe</h2>

	@if (errorMessage()) {
		<div class="message error" role="alert" aria-live="polite">
			{{ errorMessage() }}
		</div>
	}

	@if (successMessage()) {
		<div class="message success" role="status" aria-live="polite">
			{{ successMessage() }}
		</div>
	}

	<form class="form-grid" [formGroup]="changePasswordForm" (ngSubmit)="onChangePassword()">
		<label class="field">
			<span>Ancien mot de passe</span>
			<input type="password" formControlName="old_password" placeholder="••••••••" />
		</label>
		<label class="field">
			<span>Nouveau mot de passe</span>
			<input type="password" formControlName="new_password" placeholder="••••••••" />
		</label>
		<label class="field">
			<span>Confirmer le mot de passe</span>
			<input type="password" formControlName="confirm_password" placeholder="••••••••" />
		</label>

		@if (changePasswordForm.hasError('passwordMismatch') && changePasswordForm.touched) {
			<div class="message error" role="alert">Les mots de passe ne correspondent pas.</div>
		}

		<button type="submit" class="action-btn" [disabled]="loading() || changePasswordForm.invalid">
			{{ loading() ? 'Mise à jour...' : 'Mettre à jour' }}
		</button>
	</form>
</article>
