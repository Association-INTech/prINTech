services:
  fdm-monster:
    container_name: fdm-monster
    image: fdmmonster/fdm-monster:2
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
        window: 120s
    ports:
      - "4000:4000"
    volumes:
      - fdm-monster-media:/app/media
      - fdm-monster-database:/app/database

volumes:
  fdm-monster-media:
  fdm-monster-database: